<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#070a12;--bg2:#0a0e1a;--bg3:#0f1420;--bg4:#1a1f2e;
  --border:#1e2a3a;--border2:#374151;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#6b7280;--text4:#4b5563;
  --accent:#4f46e5;--accent2:#818cf8;
  --green:#22c55e;--red:#ef4444;--yellow:#f59e0b;
  --safe-top:env(safe-area-inset-top);
  --safe-bot:env(safe-area-inset-bottom);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;overflow:hidden}
#app{display:flex;flex-direction:column;height:100%;height:100dvh}

/* ── HEADER ── */
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:calc(12px + var(--safe-top)) 16px 12px;display:flex;justify-content:space-between;align-items:flex-end;flex-shrink:0}
.hdr-left .eyebrow{color:var(--accent2);font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px}
.hdr-left .title{color:var(--text);font-size:17px;font-weight:800}
.hdr-right{text-align:right}
.hdr-right .real{color:var(--red);font-size:11px;font-weight:700}
.hdr-right .demo{color:var(--text3);font-size:10px;margin-top:1px}

/* ── SCROLL BODY ── */
.body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:16px 16px calc(16px + var(--safe-bot))}

/* ── BOTTOM NAV ── */
.nav{background:var(--bg2);border-top:1px solid var(--border);display:flex;flex-shrink:0;padding-bottom:var(--safe-bot)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px;border:none;background:transparent;cursor:pointer;gap:3px;transition:opacity .15s}
.nav-btn .ico{font-size:20px}
.nav-btn .lbl{font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text3)}
.nav-btn.active .lbl{color:var(--accent2)}
.nav-btn.active .ico{filter:drop-shadow(0 0 4px #818cf8)}

/* ── CARDS ── */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.card-title{color:var(--text);font-size:14px;font-weight:700;margin-bottom:4px}
.card-sub{color:var(--text3);font-size:11px;margin-bottom:12px}

/* ── PILLS GRID ── */
.pills{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.pill{background:var(--bg4);border-radius:8px;padding:10px 10px 8px;border-left:3px solid var(--accent)}
.pill .p-label{color:var(--text3);font-size:9px;text-transform:uppercase;letter-spacing:.8px}
.pill .p-val{font-size:16px;font-weight:800;margin-top:3px}

/* ── SEGMENT CONTROL ── */
.seg{display:flex;background:var(--bg4);border-radius:8px;padding:3px;gap:3px;margin-bottom:12px}
.seg-btn{flex:1;padding:6px 0;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;background:transparent;color:var(--text3);transition:all .15s}
.seg-btn.active{background:var(--accent);color:#fff}

/* ── ALERT BOXES ── */
.alert{border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:12px;line-height:1.5;border-left:3px solid}
.alert.danger{background:#2d1515;border-color:var(--red);color:#fca5a5}
.alert.warning{background:#2d2010;border-color:var(--yellow);color:#fcd34d}
.alert.success{background:#0f2d1a;border-color:var(--green);color:#86efac}
.alert.info{background:#0f1f35;border-color:#60a5fa;color:#93c5fd}

/* ── MINI CHART ── */
.mini-chart{display:flex;align-items:flex-end;gap:3px;height:60px;margin:8px 0}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.bar{width:100%;border-radius:3px 3px 0 0;min-height:2px;transition:height .3s}
.bar-lbl{font-size:7px;color:var(--text4);writing-mode:vertical-lr;text-orientation:mixed;transform:rotate(180deg);max-height:24px;overflow:hidden}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{color:var(--text4);text-align:right;padding:4px 6px;border-bottom:1px solid var(--border);font-weight:600;font-size:10px}
.tbl th:first-child{text-align:left}
.tbl td{padding:6px 6px;border-bottom:1px solid var(--bg);text-align:right;color:var(--text2)}
.tbl td:first-child{text-align:left;color:var(--text)}

/* ── SL BAR ── */
.sl-compare{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}
.sl-bar-wrap .sl-label{font-size:10px;color:var(--text3);margin-bottom:4px}
.sl-bar-bg{background:var(--bg4);border-radius:4px;height:6px;margin-bottom:3px}
.sl-bar-fill{height:6px;border-radius:4px}
.sl-stat{font-size:12px;font-weight:700}

/* ── PLAYBOOK ── */
.pb-section{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
.pb-sec-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.pb-sec-title{color:var(--text);font-size:13px;font-weight:700}
.pb-sec-sub{color:var(--text4);font-size:10px;margin-top:2px}
.pb-edit-btn{border:1px solid var(--border2);background:var(--bg4);color:var(--text3);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;white-space:nowrap}
.pb-save-btn{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer}
.pb-content p{color:var(--text2);font-size:12px;line-height:1.6;margin-bottom:3px}
.pb-content .pbh{color:var(--accent2);font-size:12px;font-weight:700;margin-top:10px;margin-bottom:3px}
.pb-content .pbi{color:var(--text2);font-size:12px;padding-left:10px}
.pb-textarea{width:100%;min-height:180px;background:var(--bg);color:var(--text2);border:1px solid var(--border2);border-radius:8px;padding:10px;font-size:12px;font-family:monospace;resize:vertical;line-height:1.5}

/* ── SMB ── */
.smb-step{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;display:flex;gap:10px;align-items:flex-start}
.smb-num{color:var(--accent2);font-size:22px;font-weight:900;line-height:1;min-width:28px}
.smb-info .smb-t{color:var(--text);font-size:13px;font-weight:700}
.smb-info .smb-d{color:var(--text3);font-size:11px;margin-top:1px}
.why-row{display:flex;align-items:flex-start;gap:6px;margin-bottom:6px}
.why-arrow{color:var(--accent2);font-size:14px;min-width:14px;margin-top:2px}
.why-input{flex:1;background:var(--bg);color:var(--text2);border:1px solid var(--border2);border-radius:6px;padding:7px 9px;font-size:12px}
.why-count-btns{display:flex;gap:4px;margin-bottom:8px}
.wc-btn{background:var(--bg4);color:var(--text3);border:none;border-radius:5px;padding:4px 10px;font-size:11px;cursor:pointer}
.wc-btn.active{background:var(--accent);color:#fff}
.report-item{background:var(--bg);border-radius:8px;padding:10px;margin-bottom:6px;border-left:3px solid}
.victory-row{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:var(--bg);border-radius:6px;margin-bottom:4px}
.vict-txt{color:#86efac;font-size:12px}
.vict-date{color:var(--text4);font-size:10px}
.add-row{display:flex;gap:6px;margin-bottom:10px}
.add-input{flex:1;background:var(--bg);color:var(--text2);border:1px solid var(--border2);border-radius:8px;padding:8px 10px;font-size:12px}
.add-btn{background:var(--green);color:#000;border:none;border-radius:8px;padding:8px 14px;font-size:16px;font-weight:800;cursor:pointer}

/* ── DIAGNÓSTICO ── */
.diag-score{background:var(--bg3);border:1px solid var(--accent);border-radius:12px;padding:16px;text-align:center;margin-bottom:14px}
.diag-score .big-num{font-size:52px;font-weight:900;line-height:1}
.diag-area{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.diag-area-title{color:var(--text);font-size:13px;font-weight:700;margin-bottom:2px}
.diag-target{color:var(--text4);font-size:10px;margin-bottom:8px}
.diag-bars{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.diag-bar-wrap .dlabel{font-size:10px;color:var(--text3);margin-bottom:3px}
.diag-bar-bg{background:var(--bg4);border-radius:3px;height:5px;margin-bottom:3px}
.diag-bar-fill{height:5px;border-radius:3px}
.diag-val{font-size:12px;color:var(--text2)}
.diag-insight{background:var(--bg);border-radius:6px;padding:8px 10px;border-left:3px solid var(--border2);font-size:11px;color:var(--text3);line-height:1.5}

/* ── CSV UPLOAD ── */
.upload-zone{border:2px dashed var(--border2);border-radius:12px;padding:24px 16px;text-align:center;cursor:pointer;transition:border-color .2s;margin-bottom:12px}
.upload-zone.drag{border-color:var(--accent)}
.upload-zone .uz-icon{font-size:32px;margin-bottom:8px}
.upload-zone .uz-title{color:var(--text);font-size:14px;font-weight:700;margin-bottom:4px}
.upload-zone .uz-sub{color:var(--text3);font-size:11px}
#file-input-real,#file-input-demo{display:none}

.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;width:100%}
.btn-secondary{background:var(--bg4);color:var(--text2);border:1px solid var(--border2);border-radius:8px;padding:8px 14px;font-size:12px;cursor:pointer}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.badge.green{background:#0f2d1a;color:var(--green)}
.badge.red{background:#2d1515;color:var(--red)}
.badge.yellow{background:#2d2010;color:var(--yellow)}
</style>
</head>

// ═══════════════════════════════════════════════════════════════════════
// CSV PARSER
// ═══════════════════════════════════════════════════════════════════════
function parseCSV(text) {
  // Detect separator (comma or semicolon)
  const firstLine = text.trim().split('\n')[0];
  const sep = firstLine.split(';').length > firstLine.split(',').length ? ';' : ',';
  
  const lines = text.trim().split('\n');
  // Skip comment/info lines that don't look like headers (Exness sometimes adds them)
  let headerIdx = 0;
  for(let i=0;i<Math.min(5,lines.length);i++){
    if(lines[i].toLowerCase().includes('profit') || lines[i].toLowerCase().includes('time') || lines[i].toLowerCase().includes('ticket')){
      headerIdx = i; break;
    }
  }
  const headers = lines[headerIdx].split(sep).map(h=>h.trim().replace(/"/g,'').toLowerCase());
  const rows = [];
  for(let i=headerIdx+1;i<lines.length;i++){
    if(!lines[i].trim()) continue;
    // Handle quoted fields with commas inside
    const vals = splitCSVLine(lines[i], sep);
    const row = {};
    headers.forEach((h,j)=>{ row[h] = (vals[j]||'').trim().replace(/"/g,''); });
    // Accept row if it has any profit-like field
    const hasProfit = headers.some(h=>h.includes('profit'));
    if(hasProfit) rows.push(row);
  }
  return rows;
}

function splitCSVLine(line, sep) {
  const result = []; let cur = ''; let inQ = false;
  for(let i=0;i<line.length;i++){
    if(line[i]==='"'){inQ=!inQ;}
    else if(line[i]===sep&&!inQ){result.push(cur);cur='';}
    else{cur+=line[i];}
  }
  result.push(cur);
  return result;
}

// Map flexible Exness column names to canonical names
function normalizeRow(row, headers) {
  const find = (...names) => {
    for(const n of names){ const k=headers.find(h=>h.includes(n)); if(k!==undefined) return row[k]||''; }
    return '';
  };
  return {
    opening_time_utc: find('open time','opening_time','open_time','time','fecha'),
    profit:           find('profit','ganancia','resultado','p&l','pnl'),
    stop_loss:        find('s/l','sl','stop_loss','stop loss','stoploss'),
    lots:             find('lots','lotes','volume','vol','size','lotaje'),
    symbol:           find('symbol','simbolo','instrument','pair','activo'),
    type:             find('type','tipo','direction','side'),
  };
}

function processRows(rawRows) {
  const headers = rawRows.length ? Object.keys(rawRows[0]) : [];
  const rows = rawRows.map(r => normalizeRow(r, headers));
  const valid = rows.filter(r => r.opening_time_utc && r.profit !== '' && !isNaN(parseFloat(r.profit)));
  
  // monthly / weekly / daily
  const monthly = {};
  const weekly = {};
  const daily = {};
  valid.forEach(r => {
    const d = new Date(r.opening_time_utc);
    const mKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const profit = parseFloat(r.profit);
    const sl = r.stop_loss && r.stop_loss !== '' && r.stop_loss !== '0';
    const lots = parseFloat(r.lots)||0;
    if(!monthly[mKey]) monthly[mKey]={month:mKey,trades:0,profit:0,wins:0,losses:0,lots:[],slCount:0};
    monthly[mKey].trades++;
    monthly[mKey].profit += profit;
    if(profit>0) monthly[mKey].wins++; else if(profit<0) monthly[mKey].losses++;
    monthly[mKey].lots.push(lots);
    if(sl) monthly[mKey].slCount++;

    // daily
    const dKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if(!daily[dKey]) daily[dKey]={trades:0,profit:0,wins:0};
    daily[dKey].trades++; daily[dKey].profit+=profit;
    if(profit>0) daily[dKey].wins++;

    // week: get monday
    const dow = d.getDay(); const diff = d.getDate() - dow + (dow===0?-6:1);
    const mon = new Date(d.setDate(diff));
    const wKey = `${mon.getFullYear()}-${String(mon.getMonth()+1).padStart(2,'0')}-${String(mon.getDate()).padStart(2,'0')}`;
    if(!weekly[wKey]) weekly[wKey]={week:wKey,trades:0,profit:0,wins:0};
    weekly[wKey].trades++; weekly[wKey].profit+=profit;
    if(profit>0) weekly[wKey].wins++;
  });

  // Round daily profits
  Object.keys(daily).forEach(k=>{ daily[k].profit=Math.round(daily[k].profit*100)/100; });

  const monthlyArr = Object.values(monthly).sort((a,b)=>a.month.localeCompare(b.month)).map(m=>({
    month:m.month, trades:m.trades,
    profit:Math.round(m.profit*100)/100,
    wins:m.wins, losses:m.losses,
    wr:Math.round(m.wins/m.trades*1000)/10,
    avg_lot:Math.round(m.lots.reduce((a,b)=>a+b,0)/m.lots.length*100)/100,
    max_lot:Math.max(...m.lots),
    sl_pct:Math.round(m.slCount/m.trades*1000)/10
  }));

  const weeklyArr = Object.values(weekly).sort((a,b)=>a.week.localeCompare(b.week)).slice(-12).map(w=>({
    week:w.week, trades:w.trades,
    profit:Math.round(w.profit*100)/100,
    wr:Math.round(w.wins/w.trades*1000)/10
  }));

  // summary
  const allProfits = valid.map(r=>parseFloat(r.profit));
  const withSL = valid.filter(r=>r.stop_loss&&r.stop_loss!==''&&r.stop_loss!=='0');
  const noSL = valid.filter(r=>!r.stop_loss||r.stop_loss===''||r.stop_loss==='0');
  const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0;
  const wr = arr => arr.length ? arr.filter(x=>x>0).length/arr.length*100 : 0;
  
  return {
    summary:{
      total_trades:valid.length,
      total_profit:Math.round(allProfits.reduce((a,b)=>a+b,0)*100)/100,
      win_rate:Math.round(wr(allProfits)*10)/10,
      avg_profit:Math.round(avg(allProfits)*100)/100,
      sl_pct:Math.round(withSL.length/valid.length*1000)/10,
      avg_lot:Math.round(avg(valid.map(r=>parseFloat(r.lots)||0))*100)/100,
      max_lot:Math.max(...valid.map(r=>parseFloat(r.lots)||0)),
      with_sl_avg:Math.round(avg(withSL.map(r=>parseFloat(r.profit)))*100)/100,
      no_sl_avg:Math.round(avg(noSL.map(r=>parseFloat(r.profit)))*100)/100,
      with_sl_wr:Math.round(wr(withSL.map(r=>parseFloat(r.profit)))*10)/10,
      no_sl_wr:Math.round(wr(noSL.map(r=>parseFloat(r.profit)))*10)/10,
    },
    monthly:monthlyArr, weekly:weeklyArr, daily
  };
}

function renderPBText(text){
  return text.split('\n').map(line=>{
    if(line.startsWith('**')&&line.endsWith('**')) return `<p class="pbh">${line.replace(/\*\*/g,'')}</p>`;
    if(/^[-☐☑]/.test(line)||/^\d\./.test(line)) return `<p class="pbi">${line}</p>`;
    return line?`<p>${line}</p>`:'<br/>';
  }).join('');
}

    {area:'Gestión de Lotaje',real_val:`Máx ${rs.max_lot} | Med ${rs.avg_lot}`,demo_val:`Máx ${ds.max_lot} | Med ${ds.avg_lot}`,target:'Máx 2x avg',real_s:8,demo_s:90,insight:'Mayo 26: avg 15.68 lotes con -$81.743. Episodio severo de revenge trading. Demo muestra que sabés controlarlo.'},
    {area:'Win Rate',real_val:`${rs.win_rate}%`,demo_val:`${ds.win_rate}%`,target:'>55%',real_s:rs.win_rate>=55?80:50,demo_s:ds.win_rate>=55?80:50,insight:'El WR real es razonable (54%). El problema no es encontrar entradas ganadoras, sino la gestión posterior.'},
    {area:'Resultado promedio',real_val:fmtP(rs.avg_profit),demo_val:fmtP(ds.avg_profit),target:'>$0',real_s:rs.avg_profit>0?100:10,demo_s:ds.avg_profit>-1?70:40,insight:'Con WR 54% y avg -$57/trade el R:R real es negativo. Las pérdidas superan las ganancias en tamaño.'},
    {area:'Disciplina SL',real_val:`Con SL: ${rs.with_sl_wr}% WR`,demo_val:`Con SL: ${ds.with_sl_wr}% WR`,target:'>50% con SL',real_s:rs.with_sl_wr>=50?70:40,demo_s:ds.with_sl_wr>=50?70:50,insight:'Con SL en real el WR baja al 46.5% pero controla pérdidas. Necesitás mejorar la entrada + el SL, no eliminarlo.'},
  ];
  const overall = Math.round(items.reduce((a,i)=>a+i.real_s,0)/items.length);
  const overallColor = overall>=70?'#22c55e':overall>=50?'#f59e0b':'#ef4444';

  return `
  <div class="diag-score">
    <div style="color:#6b7280;font-size:11px;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Alineación Global — Real</div>
    <div class="big-num" style="color:${overallColor}">${overall}%</div>
    <div style="color:#4b5563;font-size:12px;margin-top:4px">${overall<40?'Proceso desalineado. Foco en disciplina antes de escalar.':overall<60?'Bases correctas, ejecución inconsistente. 2-3 cambios concretos pueden moverlo.':'Buen nivel. Afinar detalles.'}</div>
  </div>

  ${items.map(item=>`
  <div class="diag-area">
    <div class="diag-area-title">${item.area}</div>
    <div class="diag-target">Objetivo: ${item.target}</div>
    <div class="diag-bars">
      <div class="diag-bar-wrap">
        <div class="dlabel">🔴 Real</div>
        <div class="diag-bar-bg"><div class="diag-bar-fill" style="width:${item.real_s}%;background:${scolor(item.real_s,70,40)}"></div></div>
        <div class="diag-val">${item.real_val}</div>
      </div>
      <div class="diag-bar-wrap">
        <div class="dlabel">🔵 Demo</div>
        <div class="diag-bar-bg"><div class="diag-bar-fill" style="width:${item.demo_s}%;background:${scolor(item.demo_s,70,40)}"></div></div>
        <div class="diag-val">${item.demo_val}</div>
      </div>
    </div>
    <div class="diag-insight">${item.insight}</div>
  </div>`).join('')}`;
}

// ── SMB ──────────────────────────────────────────────────────────────
function renderSMB(){
  const preDx = [
    {e:'Operar sin Stop Loss',impact:'alto',whys:['No quiero limitar la operación','Creo que el precio va a volver','No acepto la pérdida hasta que es mayor','Me cuesta ejecutar el plan bajo presión'],sol:'Regla: SL obligatorio antes de entrar. Sin SL lógico → no entrar.'},
    {e:'Subir lotaje tras pérdidas',impact:'alto',whys:['Quiero recuperar lo perdido rápido','Frustración y necesidad de acción','No tengo regla de lotaje fija'],sol:'Regla: 2 pérdidas seguidas → siguiente trade al 50% del lote estándar.'},
    {e:'Seguir operando en rachas perdedoras',impact:'alto',whys:['Creo que la siguiente será diferente','No acepto cerrar en negativo','No tengo límite de pérdida diaria'],sol:'Regla: 3 pérdidas seguidas = fin de sesión. Sin excepciones.'},
  ];
  const impColors = {alto:'#ef4444',medio:'#f59e0b',bajo:'#22c55e'};

  return `
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:16px">
    ${[{n:'1',t:'Registrar',d:'Errores sin juzgar'},{n:'2',t:'Priorizar',d:'Mayor impacto'},{n:'3',t:'5 Porqués',d:'Raíz del problema'},{n:'4',t:'Solución',d:'Acción concreta'},{n:'5',t:'Victorias',d:'Acumular momentum'}].map(s=>`
    <div style="background:#0f1420;border:1px solid #1e2a3a;border-radius:8px;padding:8px;text-align:center">
      <div style="color:#4f46e5;font-size:18px;font-weight:900">${s.n}</div>
      <div style="color:#e2e8f0;font-size:10px;font-weight:700">${s.t}</div>
      <div style="color:#4b5563;font-size:9px">${s.d}</div>
    </div>`).join('')}
  </div>

  <div class="card" style="border-color:#ef444440">
    <div style="color:#ef4444;font-size:11px;font-weight:700;margin-bottom:10px">🚨 ERRORES DETECTADOS EN TUS DATOS</div>
    ${preDx.map((p,i)=>`
    <div style="${i<preDx.length-1?'border-bottom:1px solid #1e2a3a;padding-bottom:10px;margin-bottom:10px':''}">
      <div style="color:#f87171;font-weight:700;font-size:13px;margin-bottom:4px">${p.e}</div>
      ${p.whys.map(w=>`<div style="color:#94a3b8;font-size:11px;padding-left:8px">→ ${w}</div>`).join('')}
      <div style="background:#070a12;border-radius:6px;padding:6px 10px;margin-top:6px;border-left:3px solid #4f46e5;color:#818cf8;font-size:11px">💡 ${p.sol}</div>
    </div>`).join('')}
  </div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div class="card-title" style="margin:0">📋 Registrar error</div>
      <button class="btn-secondary" onclick="toggleSMBForm()" style="${state.smbShowForm?'background:#4f46e5;color:#fff':''}">
        ${state.smbShowForm?'Cancelar':'+ Nuevo'}
      </button>
    </div>

    ${state.smbShowForm ? `
    <div>
      <div style="color:#6b7280;font-size:11px;margin-bottom:4px">Describe el error</div>
      <textarea id="smb-error" class="pb-textarea" style="min-height:60px" placeholder="Ej: Moví el SL en contra para evitar la pérdida...">${state.smbError}</textarea>

      <div style="color:#6b7280;font-size:11px;margin:8px 0 4px">Impacto</div>
      <div style="display:flex;gap:6px;margin-bottom:10px">
        ${['alto','medio','bajo'].map(v=>`
        <button onclick="setSMBImpact('${v}')" style="flex:1;padding:5px 0;border:none;border-radius:6px;cursor:pointer;font-size:11px;font-weight:700;background:${state.smbImpact===v?impColors[v]:'#1a1f2e'};color:${state.smbImpact===v?'#fff':'#6b7280'}">${v}</button>`).join('')}
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div style="color:#6b7280;font-size:11px">${state.smbWhyCount} Porqués</div>
        <div class="why-count-btns">${[2,3,4,5].map(n=>`
          <button class="wc-btn ${state.smbWhyCount===n?'active':''}" onclick="setWhyCount(${n})">${n}</button>`).join('')}
        </div>
      </div>
      ${Array.from({length:state.smbWhyCount}).map((_,j)=>`
      <div class="why-row">
        <div class="why-arrow">→</div>
        <input class="why-input" id="why-${j}" value="${state.smbWhys[j]||''}" placeholder="¿Por qué ${j+1}?" oninput="updateWhy(${j},this.value)"/>
      </div>`).join('')}

      <div style="color:#6b7280;font-size:11px;margin:8px 0 4px">Solución concreta</div>
      <textarea id="smb-sol" class="pb-textarea" style="min-height:60px" placeholder="Regla específica a implementar...">${state.smbSolution}</textarea>

      <button class="btn-primary" style="margin-top:10px" onclick="saveSMBReport()">Guardar reporte</button>
    </div>` : ''}

    ${state.smbReports.length>0 ? `
    <div style="margin-top:${state.smbShowForm?'16px':'0'}">
      <div style="color:#6b7280;font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Historial</div>
      ${state.smbReports.map(r=>`
      <div class="report-item" style="border-color:${impColors[r.impact]}">
        <div style="display:flex;justify-content:space-between">
          <div style="color:#e2e8f0;font-size:12px;font-weight:700">${r.error}</div>
          <div style="color:#4b5563;font-size:10px;white-space:nowrap;margin-left:6px">${r.date}</div>
        </div>
        ${r.whys.filter(w=>w).map(w=>`<div style="color:#6b7280;font-size:11px;padding-left:6px">→ ${w}</div>`).join('')}
        ${r.solution?`<div style="color:#818cf8;font-size:11px;margin-top:4px">💡 ${r.solution}</div>`:''}
      </div>`).join('')}
    </div>` : ''}
  </div>

  <div class="card" style="border-color:#22c55e30">
    <div style="color:#22c55e;font-weight:700;font-size:14px;margin-bottom:10px">🏆 Pequeñas victorias</div>
    <div class="add-row">
      <input class="add-input" id="victory-input" placeholder="Ej: Hoy puse SL en todas las operaciones..." value="${state.newVictory}" oninput="state.newVictory=this.value"/>
      <button class="add-btn" onclick="addVictory()">+</button>
    </div>
    ${state.smbVictories.length===0?`<div style="color:#374151;font-size:12px;text-align:center;padding:12px">Registrá tu primera pequeña victoria hoy.</div>`:''}
    ${state.smbVictories.map(v=>`
    <div class="victory-row">
      <span class="vict-txt">✓ ${v.text}</span>
      <span class="vict-date">${v.date}</span>
    </div>`).join('')}
  </div>`;
}

// ═══════════════════════════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════════════════════════
function bindEvents(){}

function toggleSMBForm(){state.smbShowForm=!state.smbShowForm;render();}
function setSMBImpact(v){state.smbImpact=v;render();}
function setWhyCount(n){state.smbWhyCount=n;render();}
function updateWhy(i,v){state.smbWhys[i]=v;}

function saveSMBReport(){
  const errorEl = document.getElementById('smb-error');
  const solEl = document.getElementById('smb-sol');
  const error = errorEl ? errorEl.value.trim() : state.smbError;
  const solution = solEl ? solEl.value.trim() : state.smbSolution;
  if(!error) return;
  const whys = [];
  for(let i=0;i<state.smbWhyCount;i++){
    const el = document.getElementById(`why-${i}`);
    whys.push(el ? el.value.trim() : (state.smbWhys[i]||''));
  }
  const report = {id:Date.now(),date:today(),error,impact:state.smbImpact,whys:whys.filter(w=>w),solution};
  state.smbReports = [report, ...state.smbReports];
  ss('smbReports', state.smbReports);
  state.smbError=''; state.smbSolution=''; state.smbWhys=['','','','',''];
  state.smbShowForm=false;
  render();
}

function addVictory(){
  const el = document.getElementById('victory-input');
  const text = el ? el.value.trim() : state.newVictory.trim();
  if(!text) return;
  const v = {id:Date.now(),date:today(),text};
  state.smbVictories = [v, ...state.smbVictories];
  ss('smbVictories', state.smbVictories);
  state.newVictory='';
  render();
}

function loadCSV(file, account){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const rows = parseCSV(e.target.result);
      const processed = processRows(rows);
      if(account==='real'){
        state.realData = processed;
        state.realDaily = processed.daily || {};
        ss('realData', processed);
        ss('realDaily', state.realDaily);
      } else {
        state.demoData = processed;
        state.demoDaily = processed.daily || {};
        ss('demoData', processed);
        ss('demoDaily', state.demoDaily);
      }
      // Update header
      document.getElementById('hdr-real').textContent = `Real: ${fmtP(state.realData.summary.total_profit)}`;
      document.getElementById('hdr-demo').textContent = `Demo: ${fmtP(state.demoData.summary.total_profit)}`;
      alert(`✅ ${account==='real'?'Real':'Demo'} actualizado: ${processed.summary.total_trades} operaciones cargadas.`);
      render();
    } catch(err) {
      alert('❌ Error leyendo el CSV. Asegurate de exportar desde Exness como CSV estándar.\n'+err.message);
    }
  };
  reader.readAsText(file);
}

render();

// Service Worker para PWA
if('serviceWorker' in navigator){
  const swCode = `
    const CACHE='trading-pb-v1';
    self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['.']))));
    self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
      const clone=res.clone();
      caches.open(CACHE).then(c=>c.put(e.request,clone));
      return res;
    }))));
  `;
  const blob = new Blob([swCode],{type:'application/javascript'});
  const url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(()=>{});
}
